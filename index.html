<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Мой договор · Mon contrat</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14171C">
</head>
<body>
<header>
  <div class="brand">
    <span class="logo"><svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="lgN" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2A4372"/><stop offset="1" stop-color="#13203A"/></linearGradient><linearGradient id="lgG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EACD8E"/><stop offset="1" stop-color="#B6853B"/></linearGradient><clipPath id="lgC"><rect x="2" y="2" width="44" height="44" rx="13"/></clipPath></defs><g clip-path="url(#lgC)"><rect x="2" y="2" width="44" height="44" fill="url(#lgN)"/><path d="M24 8 L26.7 20.3 L39 23 L26.7 25.7 L24 38 L21.3 25.7 L9 23 L21.3 20.3 Z" fill="url(#lgG)"/><rect x="2" y="39.5" width="14.67" height="6.5" fill="#2C4FA2"/><rect x="16.67" y="39.5" width="14.66" height="6.5" fill="#F4F1EA"/><rect x="31.33" y="39.5" width="14.67" height="6.5" fill="#C4342C"/></g></svg></span>
    <div><b data-i18n="brand_name">Мой договор</b><span data-i18n="brand_tag">сначала цена — потом работа</span></div>
  </div>
  <div class="hbtns">
    <button class="hbtn" id="lang" aria-label="language">FR</button>
    <button class="hbtn ico" id="theme" aria-label="theme">◐</button>
  </div>
</header>

<main>
  <section class="view active" id="v-today">
    <div id="t-home">
      <div class="greet"><div class="date" id="t-date"></div><h1 id="t-hi"></h1></div>
      <div class="streak">
        <span class="flame" id="t-flame">🔥</span>
        <div><div class="big"><span id="t-streak" class="mono">0</span> <span style="font-size:15px;font-family:system-ui" id="t-streak-w"></span></div><div class="sub" data-i18n="streak_sub"></div></div>
        <div class="chk"><button class="chkbtn" id="t-checkin" onclick="checkIn()"></button></div>
      </div>
      <button class="hero-btn" onclick="startRitual()">
        <span class="ic">🚦</span>
        <span class="t"><b data-i18n="hero_title"></b><span data-i18n="hero_sub"></span></span>
      </button>
      <div id="t-audit"></div>
      <div id="t-focus"></div>
      <div class="rule"><span class="ic">⚖️</span><p data-i18n-html="rule1"></p></div>
      <div class="rule"><span class="ic">🎁</span><p data-i18n-html="rule2"></p></div>
      <div class="tip" data-i18n-html="tip_today"></div>
      <div class="credit">
        <span class="clogo"><svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="cgN" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2A4372"/><stop offset="1" stop-color="#13203A"/></linearGradient><linearGradient id="cgG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EACD8E"/><stop offset="1" stop-color="#B6853B"/></linearGradient><clipPath id="cgC"><rect x="2" y="2" width="44" height="44" rx="13"/></clipPath></defs><g clip-path="url(#cgC)"><rect x="2" y="2" width="44" height="44" fill="url(#cgN)"/><path d="M24 8 L26.7 20.3 L39 23 L26.7 25.7 L24 38 L21.3 25.7 L9 23 L21.3 20.3 Z" fill="url(#cgG)"/><rect x="2" y="39.5" width="14.67" height="6.5" fill="#2C4FA2"/><rect x="16.67" y="39.5" width="14.66" height="6.5" fill="#F4F1EA"/><rect x="31.33" y="39.5" width="14.67" height="6.5" fill="#C4342C"/></g></svg></span>
        <div><b data-i18n="credit_by"></b><span class="nm">Djeirkhanov</span> · <span data-i18n="credit_ver"></span></div>
      </div>
      <button class="linkbtn" data-i18n="prof_change" onclick="editName()"></button>
      <button class="linkbtn" id="logout-btn" data-i18n="signout" style="display:none" onclick="doSignOut()"></button>
    </div>
    <div id="t-flow" style="display:none"></div>
    <div id="t-auditform" style="display:none"></div>
  </section>

  <section class="view" id="v-phrases">
    <div class="eyebrow" data-i18n="ph_eyebrow"></div>
    <h1 style="font-size:24px;margin-bottom:6px" data-i18n="ph_h1"></h1>
    <p class="lead" data-i18n="ph_lead"></p>
    <div id="phrase-list"></div>
  </section>

  <section class="view" id="v-prices">
    <div class="eyebrow" data-i18n="pr_eyebrow"></div>
    <h1 style="font-size:24px;margin-bottom:6px" data-i18n="pr_h1"></h1>
    <p class="lead" data-i18n="pr_lead"></p>
    <div id="price-list"></div>
    <div class="card" style="padding:16px;margin-top:4px">
      <h3 style="font-size:15px;margin-bottom:10px" data-i18n="pr_add_h"></h3>
      <div class="addrow">
        <input type="text" class="pnm" id="p-name" data-i18n-ph="pr_name_ph">
        <input type="text" class="pam" id="p-amt" inputmode="numeric" data-i18n-ph="pr_amt_ph">
      </div>
      <button class="btn btn-primary" style="margin-top:10px" onclick="addPrice()" data-i18n="pr_add_btn"></button>
    </div>
    <div class="tip" data-i18n-html="pr_tip"></div>
  </section>

  <section class="view" id="v-log">
    <div class="eyebrow" data-i18n="log_eyebrow"></div>
    <h1 style="font-size:24px;margin-bottom:14px" data-i18n="log_h1"></h1>
    <div class="stat-row">
      <div class="stat"><b id="s-red" class="mono">0</b><span data-i18n="stat_red"></span></div>
      <div class="stat"><b id="s-all" class="mono">0</b><span data-i18n="stat_all"></span></div>
      <div class="stat"><b id="s-money" class="mono">0</b><span data-i18n="stat_money"></span></div>
    </div>
    <div id="log-list"></div>
  </section>

  <section class="view" id="v-program">
    <div class="eyebrow" data-i18n="pg_eyebrow"></div>
    <h1 style="font-size:24px;margin-bottom:6px" data-i18n="pg_h1"></h1>
    <p class="lead" data-i18n="pg_lead"></p>
    <div class="progress"><i id="prog-bar" style="width:0"></i></div>
    <p class="mini" style="margin:6px 0 14px" id="prog-txt"></p>
    <div id="week-list"></div>
    <div class="card" style="margin-top:18px">
      <h3 data-i18n="relapse_h"></h3>
      <p style="color:var(--ink-soft);font-size:14.5px;margin:0" data-i18n="relapse_p"></p>
    </div>
  </section>
</main>

<nav>
  <button data-v="today" class="on" onclick="nav('today')"><span class="ni">🌅</span><span class="nl" data-i18n="nav_today"></span></button>
  <button data-v="phrases" onclick="nav('phrases')"><span class="ni">💬</span><span class="nl" data-i18n="nav_phrases"></span></button>
  <button data-v="prices" onclick="nav('prices')"><span class="ni">💶</span><span class="nl" data-i18n="nav_prices"></span></button>
  <button data-v="log" onclick="nav('log')"><span class="ni">📓</span><span class="nl" data-i18n="nav_log"></span></button>
  <button data-v="program" onclick="nav('program')"><span class="ni">🗺️</span><span class="nl" data-i18n="nav_program"></span></button>
</nav>

<div id="onboard" style="display:none">
  <div class="ob-card">
    <span class="ob-logo"><svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="obN" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2A4372"/><stop offset="1" stop-color="#13203A"/></linearGradient><linearGradient id="obG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EACD8E"/><stop offset="1" stop-color="#B6853B"/></linearGradient><clipPath id="obC"><rect x="2" y="2" width="44" height="44" rx="13"/></clipPath></defs><g clip-path="url(#obC)"><rect x="2" y="2" width="44" height="44" fill="url(#obN)"/><path d="M24 8 L26.7 20.3 L39 23 L26.7 25.7 L24 38 L21.3 25.7 L9 23 L21.3 20.3 Z" fill="url(#obG)"/><rect x="2" y="39.5" width="14.67" height="6.5" fill="#2C4FA2"/><rect x="16.67" y="39.5" width="14.66" height="6.5" fill="#F4F1EA"/><rect x="31.33" y="39.5" width="14.67" height="6.5" fill="#C4342C"/></g></svg></span>
    <div class="ob-brand" data-i18n="brand_name"></div>
    <div class="ob-langs">
      <button data-l="ru" onclick="obLang('ru')">РУ</button>
      <button data-l="fr" onclick="obLang('fr')">FR</button>
      <button data-l="ce" onclick="obLang('ce')">НХ</button>
    </div>
    <h2 data-i18n="onb_title"></h2>
    <p data-i18n="onb_sub"></p>
    <input type="text" id="ob-name" data-i18n-ph="onb_ph" autocomplete="name">
    <button class="btn btn-primary" data-i18n="onb_go" onclick="saveOnboard()"></button>
    <button class="linkbtn" id="ob-cancel" style="display:none" data-i18n="cancel" onclick="cancelOnboard()"></button>
  </div>
</div>

<div id="login" style="display:none">
  <div class="ob-card">
    <span class="ob-logo"><svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="loN" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2A4372"/><stop offset="1" stop-color="#13203A"/></linearGradient><linearGradient id="loG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EACD8E"/><stop offset="1" stop-color="#B6853B"/></linearGradient><clipPath id="loC"><rect x="2" y="2" width="44" height="44" rx="13"/></clipPath></defs><g clip-path="url(#loC)"><rect x="2" y="2" width="44" height="44" fill="url(#loN)"/><path d="M24 8 L26.7 20.3 L39 23 L26.7 25.7 L24 38 L21.3 25.7 L9 23 L21.3 20.3 Z" fill="url(#loG)"/><rect x="2" y="39.5" width="14.67" height="6.5" fill="#2C4FA2"/><rect x="16.67" y="39.5" width="14.66" height="6.5" fill="#F4F1EA"/><rect x="31.33" y="39.5" width="14.67" height="6.5" fill="#C4342C"/></g></svg></span>
    <div class="ob-brand" data-i18n="brand_name"></div>
    <h2 data-i18n="login_title"></h2>
    <p data-i18n="login_sub"></p>
    <button class="btn gbtn" onclick="signInGoogle()">
      <svg viewBox="0 0 48 48" width="20" height="20" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.6 2.4 30.2 0 24 0 14.6 0 6.5 5.4 2.6 13.3l7.9 6.1C12.3 13.3 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9.1h12.4c-.5 2.9-2.1 5.3-4.6 7l7.1 5.5c4.1-3.8 6.4-9.4 6.4-16.1z"/><path fill="#FBBC05" d="M10.5 28.6c-.5-1.4-.7-2.9-.7-4.6s.3-3.2.7-4.6l-7.9-6.1C1 16.5 0 20.1 0 24s1 7.5 2.6 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.5-2 15.3-5.5l-7.1-5.5c-2 1.4-4.6 2.2-8.2 2.2-6.3 0-11.7-3.8-13.5-9.4l-7.9 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
      <span data-i18n="login_google"></span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
